<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>

    <style>
        body {
            background-color: #0f172a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #3b82f6;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #2563eb;
        }

        #message {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Login</h2>

        <form onsubmit="handleLogin(event)">

            <label for="username">Username</label>
            <input type="text" id="fusername" placeholder="Enter username">

            <label for="password">Password</label>
            <input type="password" id="fpassword" placeholder="Enter password">

            <button type="submit" id="loginBtn">Login</button>

        </form>
        <p id="message"></p>
    </div>

    <script src="index.js">
    </script>

</body>
</html>
