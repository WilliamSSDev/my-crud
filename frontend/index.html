<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>

    <style>
        body {
            background-color: #0f172a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background-color: #1e293b;
            padding: 70px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
        }

        /* input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: none;
            border-radius: 0px;
            background: transparent;
            flex: 1;
            outline: none;
            color: aliceblue;
            border-bottom: 2px solid #4b6f9c;
        } */

        button {
            width: 320px;
            padding: 10px;
            background-color: #3b82f6;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-top: 30px;
        }

        button:hover {
            background-color: #2563eb;
        }

        #message {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    

    <div class="container">
        <h2>Login</h2>

        <form onsubmit="handleLogin(event)">

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="text" id="fusername" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="fpassword" placeholder="Enter password" required>
            </div>

            <div class="submit-group">
                <button type="submit">Login</button>
            </div>


        </form>
        <p id="message"></p>
    </div>

    <script src="index.js">
    </script>

    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</body>
</html>
